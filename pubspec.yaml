name: flutterbird
description: "A Web Browser built on the Ladybird engine"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  bitsdojo_window: ^0.1.6
  ffi: ^2.2.0
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.2.1
  ladybird:
    path: packages/libbird
  bird_core:
    path: packages/bird_core
  riverpod_annotation: ^4.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^4.0.3
  build_runner: ^2.12.2

flutter:
  uses-material-design: true
