name: libbird
description: "A new Flutter plugin project."
version: 0.0.1
homepage:

environment:
  sdk: ^3.11.0
  flutter: '>=3.3.0'

dependencies:
  code_assets: ^1.0.0
  ffi: ^2.2.0
  flutter:
    sdk: flutter
  hooks: ^1.0.1
  native_toolchain_c: ^0.17.4
  path: ^1.9.1
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  ffigen: ^12.0.0

flutter:
  config:
    enable-swift-package-manager: true
  plugin:
    platforms:
      linux:
        pluginClass: LibbirdPlugin
      macos:
        pluginClass: LibbirdPlugin
  
ffigen:
  name: LibbirdBindings
  description: Bindings to libbird C++ engine
  output: 'lib/src/engine_bindings.g.dart'
  headers:
    entry-points:
      - 'cpp/engine.h'
  compiler-opts:
    - '-Icpp'
