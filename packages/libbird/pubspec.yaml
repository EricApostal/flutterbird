name: libbird
description: "A new Flutter plugin project."
version: 0.0.1
homepage:

environment:
  sdk: ^3.11.0
  flutter: '>=3.3.0'

dependencies:
  code_assets: ^1.0.0
  ffi: ^2.2.0
  flutter:
    sdk: flutter
  hooks: ^1.0.1
  native_toolchain_c: ^0.17.4
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  ffigen: ^12.0.0

flutter:
  config:
    # Ideally we have this but I'm not sure how possible it is to package
    enable-swift-package-manager: false
  plugin:
    platforms:
      linux:
        pluginClass: LibbirdPlugin
      macos:
        pluginClass: LibbirdPlugin
  

  # To add custom fonts to your plugin package, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts in packages, see
  # https://flutter.dev/to/font-from-package

ffigen:
  name: LibbirdBindings
  description: Bindings to libbird C++ engine
  output: 'lib/src/engine_bindings.g.dart'
  headers:
    entry-points:
      - 'cpp/engine.h'
  compiler-opts:
    - '-Icpp'
